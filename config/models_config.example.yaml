    temperature: 0.7
    cost_tier: expensive
    context_window: 131072
    description: "Kimi 128K超长上下文版本，适合长文本处理"

  # 本地/自定义模型
  local-llama:
    provider: local
    model_name: llama-2-7b-chat
    base_url: http://localhost:8000/v1
    capabilities:
      - general
      - cheap
    max_tokens: 2000
    temperature: 0.7
    cost_tier: cheap
    context_window: 4096
    description: "本地运行的Llama模型"


# ============================================================
# Agent模型配置
# ============================================================
agent_models:
  # 首席规划师 - 需要强大的分析和规划能力
  planner:
    primary_model: gpt-4
    fallback_models:
      - claude-3-opus
      - gemini-pro
    max_retries: 3
    timeout: 180.0
    description: "规划师需要强大的分析能力，使用最强大的模型"

  # 世界构建师 - 需要创意和长上下文
  world_builder:
    primary_model: gpt-4
    fallback_models:
      - claude-3-opus
      - gemini-pro
    max_retries: 3
    timeout: 180.0
    # 任务类型到模型的映射
    task_model_map:
      create_world: gpt-4
      get_context: gpt-3.5-turbo
    description: "世界构建需要强大的创意能力"

  # 角色设计师 - 需要创意和分析
  character_designer:
    primary_model: gpt-4
    fallback_models:
      - claude-3-sonnet
      - gemini-pro
    max_retries: 3
    timeout: 120.0
    task_model_map:
      create_character: gpt-4
      get_context: gpt-3.5-turbo
    description: "角色设计需要创意能力"

  # 主笔作家 - 核心创作，需要最强创意能力
  writer:
    primary_model: gpt-4
    fallback_models:
      - claude-3-opus
      - deepseek-chat
    max_retries: 3
    timeout: 300.0
    custom_params:
      temperature: 0.8
    description: "作家是核心角色，使用最强模型以保证质量"

  # 情节策划师
  plot_planner:
    primary_model: gpt-4
    fallback_models:
      - claude-3-sonnet
      - gemini-pro
    max_retries: 3
    timeout: 120.0
    description: "情节策划需要分析能力"

  # 风格编辑 - 可以使用较便宜的模型
  editor:
    primary_model: gpt-3.5-turbo
    fallback_models:
      - claude-3-haiku
      - gemini-pro
    max_retries: 2
    timeout: 120.0
    description: "编辑润色任务相对简单，可以使用较便宜的模型"

  # 审核员 - 需要分析能力
  reviewer:
    primary_model: gpt-4
    fallback_models:
      - claude-3-sonnet
    max_retries: 3
    timeout: 120.0
    description: "审核需要分析能力"


# ============================================================
# 环境变量配置
# ============================================================
# API密钥通过环境变量设置，不要硬编码在配置文件中
# 
# 环境变量：
#   OPENAI_API_KEY      - OpenAI API密钥
#   ANTHROPIC_API_KEY   - Anthropic API密钥
#   GEMINI_API_KEY      - Google Gemini API密钥
#   DEEPSEEK_API_KEY    - DeepSeek API密钥
#   DASHSCOPE_API_KEY   - 阿里云百炼（通义千问）API密钥
#   MOONSHOT_API_KEY    - Kimi（月之暗面）API密钥
#
# 设置方法：
#   export OPENAI_API_KEY="sk-..."
#   export ANTHROPIC_API_KEY="sk-ant-..."
#   export DASHSCOPE_API_KEY="your-dashscope-key"
#   export MOONSHOT_API_KEY="your-moonshot-key"


