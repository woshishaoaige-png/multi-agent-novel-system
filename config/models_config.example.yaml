# 多Agent协作写小说系统 - 模型配置文件
# 
# 本配置文件用于定义各Agent使用的大模型
# 支持多种模型提供商：OpenAI, Anthropic, Gemini, DeepSeek, 本地模型等
#
# 使用方法：
#   1. 编辑本文件，配置您的API密钥和模型
#   2. 在代码中加载配置：
#      from app.config.agent_model_config import init_model_registry
#      registry = init_model_registry("config/models_config.yaml")

# ============================================================
# 可用模型定义
# ============================================================
models:
  # OpenAI 模型
  gpt-4:
    provider: openai
    model_name: gpt-4
    capabilities:
      - general
      - creative
      - analysis
      - long_context
    max_tokens: 8000
    temperature: 0.7
    cost_tier: expensive
    context_window: 128000
    description: "GPT-4 是 OpenAI 最强大的模型，适合复杂推理和创意写作"

  gpt-4-turbo:
    provider: openai
    model_name: gpt-4-turbo
    capabilities:
      - general
      - creative
      - analysis
      - long_context
    max_tokens: 16000
    temperature: 0.7
    cost_tier: medium
    context_window: 128000
    description: "GPT-4 Turbo，更快更便宜，适合大多数任务"

  gpt-3.5-turbo:
    provider: openai
    model_name: gpt-3.5-turbo
    capabilities:
      - general
      - fast
    max_tokens: 4000
    temperature: 0.7
    cost_tier: cheap
    context_window: 16385
    description: "快速响应，适合简单任务"

  # Anthropic Claude 模型
  claude-3-opus:
    provider: anthropic
    model_name: claude-3-opus-20240229
    capabilities:
      - general
      - creative
      - analysis
      - long_context
    max_tokens: 4000
    temperature: 0.7
    cost_tier: expensive
    context_window: 200000
    description: "Claude 3 Opus，最强大的Claude模型，适合复杂任务"

  claude-3-sonnet:
    provider: anthropic
    model_name: claude-3-sonnet-20240229
    capabilities:
      - general
      - creative
      - analysis
    max_tokens: 4000
    temperature: 0.7
    cost_tier: medium
    context_window: 200000
    description: "Claude 3 Sonnet，性价比高的选择"

  claude-3-haiku:
    provider: anthropic
    model_name: claude-3-haiku-20240307
    capabilities:
      - general
      - fast
      - cheap
    max_tokens: 4000
    temperature: 0.7
    cost_tier: cheap
    context_window: 200000
    description: "Claude 3 Haiku，快速响应，适合简单任务"

  # Google Gemini 模型
  gemini-pro:
    provider: gemini
    model_name: gemini-pro
    capabilities:
      - general
      - creative
      - analysis
    max_tokens: 4000
    temperature: 0.7
    cost_tier: medium
    context_window: 32768
    description: "Google Gemini Pro"

  gemini-ultra:
    provider: gemini
    model_name: gemini-ultra
    capabilities:
      - general
      - creative
      - analysis
      - long_context
    max_tokens: 4000
    temperature: 0.7
    cost_tier: expensive
    context_window: 32768
    description: "Google Gemini Ultra，最强大的Gemini模型"

  # DeepSeek 模型
  deepseek-chat:
    provider: deepseek
    model_name: deepseek-chat
    capabilities:
      - general
      - creative
      - analysis
    max_tokens: 4000
    temperature: 0.7
    cost_tier: cheap
    context_window: 16384
    description: "DeepSeek Chat，性价比高"

  deepseek-coder:
    provider: deepseek
    model_name: deepseek-coder
    capabilities:
      - general
      - analysis
    max_tokens: 4000
    temperature: 0.7
    cost_tier: cheap
    context_window: 16384
    description: "DeepSeek Coder，适合代码相关任务"

  # ============================================================
  # 阿里云百炼（通义千问）模型
  # ============================================================
  qwen-plus:
    provider: dashscope
    model_name: qwen-plus
    capabilities:
      - general
      - creative
      - analysis
      - long_context
    max_tokens: 6000
    temperature: 0.7
    cost_tier: medium
    context_window: 131072
